spring.application.name=product-service

# --- Database connection ---
# Values are read from environment variables (the assignment requires NOT hardcoding
# credentials). The part after ":" is a safe default used when you run locally.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/product_db}
spring.datasource.username=${DB_USERNAME:product_user}
spring.datasource.password=${DB_PASSWORD:product_pass}

# --- JPA / Hibernate ---
# "update" lets Hibernate create the "product" table automatically from your entity.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Swagger UI (API documentation) lives at: http://localhost:8080/swagger-ui.html ---
springdoc.swagger-ui.path=/swagger-ui.html
