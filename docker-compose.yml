# This file tells Docker to run a PostgreSQL database for the Product Service.
# Start it with:  docker compose up -d
# Stop it with:   docker compose down
services:
  product-db:
    image: postgres:16              # download & run PostgreSQL version 16
    container_name: product-db
    environment:
      POSTGRES_DB: product_db       # the database name (required by the assignment)
      POSTGRES_USER: product_user   # username
      POSTGRES_PASSWORD: product_pass  # password
    ports:
      - "5433:5432"                 # host port 5433 -> container 5432 (avoids clashing with native PostgreSQL on 5432)
    volumes:
      - product-db-data:/var/lib/postgresql/data  # keeps your data even after restart

volumes:
  product-db-data:
